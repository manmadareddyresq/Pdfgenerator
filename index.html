<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vriddhi 2026 | UCMH JNTUH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900">Vriddhi 2026 Certificate Engine</h1>
            <p class="text-indigo-600 font-medium">University College of Management Hyderabad (JNTUH)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 col-span-1">
                <h2 class="font-bold mb-4 flex items-center gap-2">📄 Step 1: Uploads</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block text-slate-500 font-bold mb-1 uppercase text-[10px]">Student Data (Excel)</label>
                        <input type="file" id="excelInput" accept=".xlsx" class="w-full border p-2 rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-slate-500 font-bold mb-1 uppercase text-[10px]">Background Template</label>
                        <input type="file" id="bgInput" accept="image/*" class="w-full border p-2 rounded-lg bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-slate-500 font-bold mb-1 uppercase text-[10px]">Principal Signature</label>
                        <input type="file" id="sigP" accept="image/*" class="w-full border p-2 rounded-lg bg-slate-50">
                    </div>
                </div>
                <button onclick="loadData()" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">
                    Process & Preview
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 col-span-1 md:col-span-2 overflow-hidden flex flex-col">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <span class="font-bold text-slate-700">Records Queue</span>
                    <span id="count" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold">0 found</span>
                </div>
                <div class="overflow-y-auto max-h-[400px]" id="tableWrap">
                    <table class="w-full text-left text-sm">
                        <tbody id="studentList" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                    <div id="empty" class="p-20 text-center text-slate-400">No data loaded.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl text-center shadow-2xl">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="font-bold text-slate-800">Generating PDF...</p>
            <p class="text-xs text-slate-500">Please do not close this tab.</p>
        </div>
    </div>

    <script>
        let students = [];
        let config = { bg: null, sig: null };

        async function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        async function loadData() {
            const eFile = document.getElementById('excelInput').files[0];
            const bFile = document.getElementById('bgInput').files[0];
            const sFile = document.getElementById('sigP').files[0];

            if (!eFile || !bFile) return alert("Please select Excel and Background Image.");

            config.bg = await fileToBase64(bFile);
            if (sFile) config.sig = await fileToBase64(sFile);

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                students = rows.map(r => ({
                    name: r['Student Name'] || r['Name'] || "Unknown Participant",
                    email: r['Email ID'] || r['Email'] || ""
                }));

                renderTable();
            };
            reader.readAsArrayBuffer(eFile);
        }

        function renderTable() {
            const list = document.getElementById('studentList');
            document.getElementById('empty').classList.add('hidden');
            document.getElementById('count').innerText = `${students.length} Records`;
            list.innerHTML = "";

            students.forEach((s, i) => {
                list.innerHTML += `
                    <tr class="hover:bg-indigo-50 transition">
                        <td class="p-4 font-semibold text-slate-800">${s.name}</td>
                        <td class="p-4 text-right">
                            <button onclick="downloadOne(${i})" class="bg-slate-800 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-black transition">
                                Download PDF
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function downloadOne(index) {
            const loader = document.getElementById('loading');
            loader.classList.remove('hidden');

            try {
                const { jsPDF } = window.jspdf;
                const student = students[index];
                
                // Set orientation to Landscape A4 (approx 842x595 points)
                const doc = new jsPDF({
                    orientation: 'l',
                    unit: 'px',
                    format: [842, 595]
                });

                const w = doc.internal.pageSize.getWidth();
                const h = doc.internal.pageSize.getHeight();

                // 1. Background
                doc.addImage(config.bg, 'JPEG', 0, 0, w, h);

                // 2. Main Title (Hardcoded as per requirement)
                doc.setFont("times", "bold");
                doc.setFontSize(32);
                doc.setTextColor(20, 30, 70); 
                doc.text("Certificate of Participation", w/2, 80, { align: 'center' });

                // 3. Name (Stylish)
                doc.setFont("helvetica", "bolditalic");
                doc.setFontSize(45);
                doc.setTextColor(43, 54, 116);
                doc.text(student.name, w/2, 260, { align: 'center' });

                // 4. Body Text
                doc.setFont("times", "normal");
                doc.setFontSize(16);
                doc.setTextColor(0, 0, 0);
                const bodyText = `This is to certify that ${student.name} has actively and successfully participated in 'Vriddhi 2026', organized by University College of Management Hyderabad, JNTUH on April 01, 2026. We appreciate their dedication and innovation.`;
                const splitText = doc.splitTextToSize(bodyText, 600);
                doc.text(splitText, w/2, 330, { align: 'center', lineHeightFactor: 1.5 });

                // 5. Signature
                if (config.sig) {
                    doc.addImage(config.sig, 'PNG', w - 200, h - 120, 120, 50);
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.text("Principal", w - 140, h - 60, { align: 'center' });
                }

                // 6. ID
                const certId = `V2026-P-${String(index+1).padStart(4, '0')}`;
                doc.setFontSize(10);
                doc.text(`ID: ${certId}`, w/2, h - 30, { align: 'center' });

                doc.save(`Vriddhi_Certificate_${student.name.replace(/\s+/g, '_')}.pdf`);

            } catch (err) {
                console.error(err);
                alert("PDF Generation Failed. Ensure your background image is a valid JPG/PNG.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
